
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Lattek Shop Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', system-ui, 'Cairo', sans-serif;
        }
        body {
            background: #eef2f5;
            min-height: 100vh;
            padding: 20px;
        }
        .app-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .main-header {
            background: linear-gradient(135deg, #1e3c5c 0%, #0f2b3f 100%);
            padding: 24px 20px;
            text-align: center;
            border-radius: 32px 32px 0 0;
            color: white;
        }
        .main-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .main-header h1 i {
            background: #ffb347;
            padding: 8px;
            border-radius: 60%;
            color: #1e3c5c;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 20px;
        }
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: #2c7da0;
            color: white;
        }
        .btn-danger {
            background: #d9534f;
            color: white;
        }
        .btn-warning {
            background: #f0ad4e;
            color: white;
        }
        .group-card {
            margin-bottom: 24px;
            border: 1px solid #e2edf7;
            border-radius: 28px;
            background: white;
            overflow: hidden;
        }
        .group-header {
            background: #f8fafc;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid #e2edf7;
        }
        .group-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e3c5c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .group-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .group-actions button {
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            background: #eef3fc;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .group-actions .clear-group-numbers {
            background: #f0ad4e20;
            color: #e67e22;
        }
        .product-list {
            padding: 12px 16px;
        }
        .product-row {
            display: grid;
            grid-template-columns: 2fr 1.2fr auto;
            align-items: center;
            gap: 12px;
            padding: 12px 8px;
            border-bottom: 1px solid #ecf3f9;
        }
        .product-name {
            font-weight: 500;
            color: #0c2e46;
        }
        .product-number input {
            width: 100%;
            max-width: 100px;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1.5px solid #c9dfee;
            text-align: center;
            font-size: 1rem;
        }
        .product-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .product-actions button {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .btn-edit-product { background: #fff1e0; color: #f0ad4e; }
        .btn-delete-product { background: #ffe8e6; color: #d9534f; }
        .empty-products {
            text-align: center;
            padding: 24px;
            color: #7f9cbb;
        }
        .add-product-form-inline {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            background: #f9fbfd;
            padding: 12px;
            border-radius: 28px;
        }
        .add-product-form-inline input {
            flex: 2;
            min-width: 120px;
            padding: 10px 14px;
            border-radius: 28px;
            border: 1px solid #cbdde9;
        }
        .add-product-form-inline button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 28px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6c8dae;
            border-top: 1px solid #e2edf7;
            margin-top: 20px;
        }
        @media (max-width: 550px) {
            .product-row { grid-template-columns: 1.5fr 1fr auto; gap: 6px; }
            .group-header { flex-direction: column; align-items: stretch; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
            .group-actions { justify-content: flex-start; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="main-header">
        <h1><i class="fas fa-store"></i> Lattek Shop Manager</h1>
        <p>إدارة المجموعات والمنتجات | مسح أرقام كل مجموعة على حدة</p>
    </div>

    <div class="card">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="addGroup()"><i class="fas fa-folder-plus"></i> مجموعة جديدة</button>
            <button class="btn btn-danger" onclick="clearAllNumbers()"><i class="fas fa-eraser"></i> مسح كل الأرقام (جميع المجموعات)</button>
        </div>
    </div>

    <div id="groupsContainer"></div>

    <div class="footer">
        <i class="fas fa-copyright"></i> 2025 Lattek. جميع الحقوق محفوظة.
    </div>
</div>

<script>
    // ---------- المتغيرات العامة ----------
    let groups = [];
    const STORAGE_KEY = "lattek_shop_manager";

    // ---------- دوال مساعدة ----------
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }

    function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(groups));
    }

    function loadFromStorage() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                groups = JSON.parse(stored);
                if (!Array.isArray(groups)) groups = [];
                groups = groups.map(g => ({
                    id: g.id || generateId(),
                    name: g.name || "مجموعة جديدة",
                    products: Array.isArray(g.products) ? g.products.map(p => ({
                        id: p.id || generateId(),
                        name: p.name || "منتج",
                        number: typeof p.number === 'number' ? p.number : 0
                    })) : []
                }));
            } catch(e) { groups = []; }
        } else {
            // بيانات افتراضية
            groups = [
                {
                    id: generateId(),
                    name: "المشروبات",
                    products: [
                        { id: generateId(), name: "كولا", number: 20 },
                        { id: generateId(), name: "ماء", number: 35 }
                    ]
                },
                {
                    id: generateId(),
                    name: "المخبوزات",
                    products: [
                        { id: generateId(), name: "خبز", number: 12 },
                        { id: generateId(), name: "كعك", number: 8 }
                    ]
                }
            ];
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "20px";
        toast.style.left = "50%";
        toast.style.transform = "translateX(-50%)";
        toast.style.backgroundColor = "#1e3c5c";
        toast.style.color = "white";
        toast.style.padding = "10px 20px";
        toast.style.borderRadius = "40px";
        toast.style.zIndex = "999";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- دوال إعادة العرض (مع أحداث مدمجة) ----------
    function renderGroups() {
        const container = document.getElementById("groupsContainer");
        if (!container) return;
        if (groups.length === 0) {
            container.innerHTML = `<div class="card" style="padding: 40px; text-align: center;">لا توجد مجموعات، أضف مجموعة جديدة <i class="fas fa-folder-open"></i></div>`;
            return;
        }

        let html = '';
        groups.forEach(group => {
            // بناء المنتجات
            let productsHtml = '';
            if (group.products.length === 0) {
                productsHtml = `<div class="empty-products">لا توجد منتجات في هذه المجموعة</div>`;
            } else {
                group.products.forEach(product => {
                    productsHtml += `
                        <div class="product-row">
                            <div class="product-name">${escapeHtml(product.name)}</div>
                            <div class="product-number">
                                <input type="number" class="product-number-input" value="${product.number}" step="1" onchange="updateProductNumber('${product.id}', '${group.id}', this.value)">
                            </div>
                            <div class="product-actions">
                                <button class="btn-edit-product" onclick="editProductName('${product.id}', '${group.id}')"><i class="fas fa-pencil-alt"></i></button>
                                <button class="btn-delete-product" onclick="deleteProduct('${product.id}', '${group.id}')"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    `;
                });
            }

            html += `
                <div class="group-card">
                    <div class="group-header">
                        <div class="group-title"><i class="fas fa-layer-group"></i> ${escapeHtml(group.name)}</div>
                        <div class="group-actions">
                            <button onclick="editGroupName('${group.id}')"><i class="fas fa-pencil-alt"></i> تعديل</button>
                            <button class="clear-group-numbers" onclick="clearGroupNumbers('${group.id}')"><i class="fas fa-eraser"></i> مسح أرقام المجموعة</button>
                            <button onclick="deleteGroup('${group.id}')"><i class="fas fa-trash-alt"></i> حذف</button>
                        </div>
                    </div>
                    <div class="product-list">
                        ${productsHtml}
                        <div class="add-product-form-inline">
                            <input type="text" placeholder="اسم المنتج" id="newProductName_${group.id}">
                            <input type="number" placeholder="الرقم" id="newProductNumber_${group.id}" value="0" step="1">
                            <button onclick="addProduct('${group.id}')"><i class="fas fa-plus"></i> إضافة</button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ---------- دوال العمليات ----------
    function addGroup() {
        let name = prompt("أدخل اسم المجموعة الجديدة:", "مجموعة جديدة");
        if (name && name.trim() !== "") {
            groups.push({
                id: generateId(),
                name: name.trim(),
                products: []
            });
            saveToStorage();
            renderGroups();
            showToast(`✓ تم إضافة مجموعة "${name.trim()}"`);
        } else if (name !== null) {
            alert("الاسم مطلوب");
        }
    }

    function editGroupName(groupId) {
        const group = groups.find(g => g.id === groupId);
        if (group) {
            let newName = prompt("تعديل اسم المجموعة:", group.name);
            if (newName && newName.trim() !== "") {
                group.name = newName.trim();
                saveToStorage();
                renderGroups();
                showToast(`✓ تم تعديل اسم المجموعة إلى "${newName.trim()}"`);
            } else if (newName !== null) {
                alert("الاسم لا يمكن أن يكون فارغاً.");
            }
        }
    }

    function deleteGroup(groupId) {
        if (confirm("هل أنت متأكد من حذف هذه المجموعة وجميع منتجاتها؟")) {
            groups = groups.filter(g => g.id !== groupId);
            saveToStorage();
            renderGroups();
            showToast("✓ تم حذف المجموعة");
        }
    }

    function clearGroupNumbers(groupId) {
        const group = groups.find(g => g.id === groupId);
        if (!group) return;
        if (group.products.length === 0) {
            alert("لا توجد منتجات في هذه المجموعة لمسح أرقامها.");
            return;
        }
        if (confirm(`هل تريد مسح جميع أرقام المنتجات في مجموعة "${group.name}"؟`)) {
            for (let product of group.products) {
                product.number = 0;
            }
            saveToStorage();
            renderGroups();
            showToast(`✓ تم مسح جميع أرقام مجموعة "${group.name}"`);
        }
    }

    function addProduct(groupId) {
        const nameInput = document.getElementById(`newProductName_${groupId}`);
        const numberInput = document.getElementById(`newProductNumber_${groupId}`);
        const name = nameInput ? nameInput.value.trim() : '';
        let number = numberInput ? parseFloat(numberInput.value) : 0;
        if (isNaN(number)) number = 0;
        if (name === "") {
            alert("يرجى كتابة اسم المنتج");
            return;
        }
        const group = groups.find(g => g.id === groupId);
        if (group) {
            group.products.push({
                id: generateId(),
                name: name,
                number: number
            });
            saveToStorage();
            renderGroups();
            showToast(`✓ تم إضافة المنتج "${name}"`);
        } else {
            alert("المجموعة غير موجودة");
        }
    }

    function updateProductNumber(productId, groupId, newValue) {
        const group = groups.find(g => g.id === groupId);
        if (group) {
            const product = group.products.find(p => p.id === productId);
            if (product) {
                let newNum = parseFloat(newValue);
                if (isNaN(newNum)) newNum = 0;
                product.number = newNum;
                saveToStorage();
                // لا حاجة لإعادة الرندر كاملة، لكن يمكن تحديث الحقل فقط
                // ولكن لإبقاء الواجهة متسقة نعيد الرندر
                renderGroups();
            }
        }
    }

    function editProductName(productId, groupId) {
        const group = groups.find(g => g.id === groupId);
        if (group) {
            const product = group.products.find(p => p.id === productId);
            if (product) {
                let newName = prompt("تعديل اسم المنتج:", product.name);
                if (newName && newName.trim() !== "") {
                    product.name = newName.trim();
                    saveToStorage();
                    renderGroups();
                } else if (newName !== null && newName.trim() === "") {
                    alert("الاسم لا يمكن أن يكون فارغاً.");
                }
            }
        }
    }

    function deleteProduct(productId, groupId) {
        if (confirm("هل تريد حذف هذا المنتج؟")) {
            const group = groups.find(g => g.id === groupId);
            if (group) {
                group.products = group.products.filter(p => p.id !== productId);
                saveToStorage();
                renderGroups();
                showToast("✓ تم حذف المنتج");
            }
        }
    }

    function clearAllNumbers() {
        if (groups.length === 0) {
            alert("لا توجد منتجات لمسح أرقامها.");
            return;
        }
        let anyProduct = false;
        for (let group of groups) {
            if (group.products.length) anyProduct = true;
            for (let product of group.products) {
                product.number = 0;
            }
        }
        if (!anyProduct) {
            alert("لا توجد منتجات لمسح أرقامها.");
            return;
        }
        saveToStorage();
        renderGroups();
        showToast("✓ تم مسح جميع الأرقام في كل المجموعات");
    }

    // ---------- التهيئة ----------
    function init() {
        loadFromStorage();
        renderGroups();
    }

    init();
</script>
</body>
</html>
